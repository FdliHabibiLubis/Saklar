<!doctype html>
<html lang="en">
  <head>
    <title>Saklar Lampu</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Flowbite -->
    <link
      href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css"
      rel="stylesheet"
    />

    <style>
      .lamp {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      .lamp img {
        width: 60px;
      }
    </style>
  </head>

  <body class="bg-gray-900 text-white">
    <h1 class="text-center text-3xl font-bold mt-5">SAKLAR LAMPU RUMAH</h1>

    <div class="grid md:grid-cols-2 gap-6 p-6">
      <!-- RUANGAN KELUARGA -->
      <div class="bg-gray-800 p-4 rounded-xl shadow-lg">
        <h2 class="text-xl mb-3 font-semibold">Ruang Keluarga</h2>
        <div class="flex gap-4 flex-wrap">
          <!-- 3 lampu -->
          <div class="lamp">
            <img id="lampu1" src="Assets/images/off.png" />
            <input type="checkbox" id="t1" onchange="saklar(1)" />
          </div>
          <div class="lamp">
            <img id="lampu2" src="Assets/images/off.png" />
            <input type="checkbox" id="t2" onchange="saklar(2)" />
          </div>
          <div class="lamp">
            <img id="lampu3" src="Assets/images/off.png" />
            <input type="checkbox" id="t3" onchange="saklar(3)" />
          </div>
        </div>
      </div>

      <!-- RUANGAN MAKAN -->
      <div class="bg-gray-800 p-4 rounded-xl shadow-lg">
        <h2 class="text-xl mb-3 font-semibold">Ruang Makan</h2>
        <div class="flex gap-4">
          <div class="lamp">
            <img id="lampu4" src="Assets/images/off.png" />
            <input type="checkbox" id="t4" onchange="saklar(4)" />
          </div>
        </div>
      </div>

      <!-- RUANGAN TIDUR -->
      <div class="bg-gray-800 p-4 rounded-xl shadow-lg">
        <h2 class="text-xl mb-3 font-semibold">Ruang Tidur</h2>
        <div class="flex gap-4">
          <div class="lamp">
            <img id="lampu5" src="Assets/images/off.png" />
            <input type="checkbox" id="t5" onchange="saklar(5)" />
          </div>
          <div class="lamp">
            <img id="lampu6" src="Assets/images/off.png" />
            <input type="checkbox" id="t6" onchange="saklar(6)" />
          </div>
        </div>
      </div>

      <!-- RUANGAN TAMU -->
      <div class="bg-gray-800 p-4 rounded-xl shadow-lg">
        <h2 class="text-xl mb-3 font-semibold">Ruang Tamu</h2>
        <div class="flex gap-4 flex-wrap">
          <div class="lamp">
            <img id="lampu7" src="Assets/images/off.png" />
            <input type="checkbox" id="t7" onchange="saklar(7)" />
          </div>
          <div class="lamp">
            <img id="lampu8" src="Assets/images/off.png" />
            <input type="checkbox" id="t8" onchange="saklar(8)" />
          </div>
          <div class="lamp">
            <img id="lampu9" src="Assets/images/off.png" />
            <input type="checkbox" id="t9" onchange="saklar(9)" />
          </div>
          <div class="lamp">
            <img id="lampu10" src="Assets/images/off.png" />
            <input type="checkbox" id="t10" onchange="saklar(10)" />
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
